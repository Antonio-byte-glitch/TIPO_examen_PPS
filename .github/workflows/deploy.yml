name: Build, Push and Deploy to AWS

on:
  pull_request:
    paths:
      - 'src/**'
    types: [closed]

jobs:
  build-and-deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DH_USUARIO }}
          password: ${{ secrets.DH_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DH_USUARIO }}/fastapi:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DH_USUARIO }}/fastapi:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AMZ_IP }}
          username: ${{ secrets.AMZ_USUARIO }}
          key: ${{ secrets.AMZ_CLAVE }}
          script: |
            docker pull ${{ secrets.DH_USUARIO }}/fastapi:latest
            docker stop fastapi-app || true
            docker rm fastapi-app || true
            docker run -d --name fastapi-app -p 80:8000 ${{ secrets.DH_USUARIO }}/fastapi:latest
